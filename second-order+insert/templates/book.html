<html>
    <p>Author: {{name}}</p>
    <form method="POST">
        <label><b>Add book</b></label><br><br>
        <label>Name </label><input type="text" name="book_name"><br>
        <label>Content </label><br><textarea name="content"></textarea><br>
        <button type="Submit">Add</button>
    </form>
    <table>
        <tr>
            <th>Name</th>
            <th>Content</th>
        </tr>
        {% for d in post %}
        <tr>
            <td>{{d[0]}}</td>
            <td>{{d[1]}}</td>
        </tr>
        {% endfor %}
    </table>
</html>
