ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/upload>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
        php_admin_flag engine off

        <FilesMatch "\.ph(p[0-9]?|tml)$">
            Require all denied
        </FilesMatch>
    </Directory>
</VirtualHost>
