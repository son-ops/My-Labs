services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FETCH_TIMEOUT: 3
      MAX_RESPONSE_BYTES: 16384
      DB_HOST: db
      DB_PORT: 3306
      DB_ROOT_USER: root
      DB_ROOT_PASSWORD: rootpassword
      ARCHIVE_DB: archive
      LEGACY_USER: legacy_export
      FLAG_VALUE: SSS{mysql_gopher_curl_lab}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
