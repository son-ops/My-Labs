<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Gopher</title>
    <style>
      body {
        margin: 0;
        padding: 32px 16px;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1, h2 {
        margin-top: 0;
      }

      form, section {
        margin-top: 16px;
        padding: 16px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 6px;
        background: #222;
        color: #fff;
        cursor: pointer;
      }

      .meta {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }

      .meta div {
        min-width: 120px;
        padding: 10px 12px;
        background: #f8f8f8;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      .error {
        color: #b00020;
      }

      pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        background: #f8f8f8;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gopher</h1>
      <form method="get">
        <input id="url" name="url" type="text" value="{{ target }}" required>
        <button type="submit">Fetch</button>
      </form>
      {% if error %}
        <section>
          <h2>Error</h2>
          <p class="error">{{ error }}</p>
        </section>
      {% endif %}
      {% if result %}
        <section>
          <h2>Result</h2>
          {% if result.warning %}
            <p class="error">{{ result.warning }}</p>
          {% endif %}
          <div class="meta">
            <div><strong>Fetcher</strong><br>{{ result.fetcher }}</div>
            <div><strong>Bytes</strong><br>{{ result.bytes }}</div>
          </div>
          <pre>{{ result.body }}</pre>
        </section>
      {% endif %}
    </main>
  </body>
</html>
